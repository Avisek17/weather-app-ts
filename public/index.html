<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Smart Location Dashboard
    </title>

    <link
        rel="stylesheet"
        href="../src/styles/styles.css">

</head>

<body>

    <header class="header">

        <h1>
            🌍 Smart Location Dashboard
        </h1>

        <button id="themeBtn">
            🌙
        </button>

    </header>

    <main class="dashboard">

        <!-- Location Card -->
        <section
            id="location"
            class="card">

            <h2>
                📍 Location
            </h2>

            <p>
                Loading location...
            </p>

        </section>

        <!-- Weather Card -->
        <section
            id="weather"
            class="card">

            <h2>
                🌤 Weather
            </h2>

            <p>
                Loading weather...
            </p>

        </section>

        <!-- Country Card -->
        <section
            id="country"
            class="card">

            <h2>
                🌎 Country
            </h2>

            <p>
                Coming Soon...
            </p>

        </section>

        <!-- News Card -->
        <section
            id="news"
            class="card">

            <h2>
                📰 News
            </h2>

            <p>
                Coming Soon...
            </p>

        </section>

        <!-- Clock Card -->
        <section
            id="clock"
            class="card">

            <h2>
                ⏰ Local Time
            </h2>

            <p>
                Coming Soon...
            </p>

        </section>

    </main>

    <script
        type="module"
        src="./app.js">
    </script>

</body>

</html>
